<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Magnetic Field & Inclinometer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 1.5rem;
            text-align: center;
            color: #4CAF50;
        }
        .card {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 1.2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        .label {
            color: #aaaaaa;
        }
        .value {
            font-weight: bold;
            font-family: monospace;
        }
        .highlight {
            color: #4CAF50;
            font-size: 1.4rem;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            max-width: 400px;
        }
        button:active {
            background-color: #45a049;
        }
        #error-msg {
            color: #ff5252;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>Magnetic Field & Orientation</h1>

    <div class="card">
        <h3>Magnetometer (µT)</h3>
        <div class="data-row">
            <span class="label">X-Axis:</span>
            <span class="value" id="mag-x">0.00</span>
        </div>
        <div class="data-row">
            <span class="label">Y-Axis:</span>
            <span class="value" id="mag-y">0.00</span>
        </div>
        <div class="data-row">
            <span class="label">Z-Axis:</span>
            <span class="value" id="mag-z">0.00</span>
        </div>
        <div class="data-row">
            <span class="label">Magnitude:</span>
            <span class="value highlight" id="mag-total">0.00</span>
        </div>
    </div>

    <div class="card">
        <h3>Inclinometer / Direction</h3>
        <div class="data-row">
            <span class="label">Heading (Alpha):</span>
            <span class="value" id="dir-alpha">0.0°</span>
        </div>
        <div class="data-row">
            <span class="label">Pitch (Beta):</span>
            <span class="value" id="dir-beta">0.0°</span>
        </div>
        <div class="data-row">
            <span class="label">Roll (Gamma):</span>
            <span class="value" id="dir-gamma">0.0°</span>
        </div>
    </div>

    <button id="start-btn">Start Sensors</button>
    <div id="error-msg"></div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const errorMsg = document.getElementById('error-msg');

        // DOM Elements for Magnetometer
        const magX = document.getElementById('mag-x');
        const magY = document.getElementById('mag-y');
        const magZ = document.getElementById('mag-z');
        const magTotal = document.getElementById('mag-total');

        // DOM Elements for Orientation
        const dirAlpha = document.getElementById('dir-alpha');
        const dirBeta = document.getElementById('dir-beta');
        const dirGamma = document.getElementById('dir-gamma');

        let magnetometer = null;

        function startSensors() {
            errorMsg.textContent = "";

            // 1. Initialize Magnetometer
            if ('Magnetometer' in window) {
                try {
                    magnetometer = new Magnetometer({ frequency: 10 });
                    
                    magnetometer.addEventListener('reading', () => {
                        const x = magnetometer.x;
                        const y = magnetometer.y;
                        const z = magnetometer.z;
                        
                        // Calculate total magnitude: B = sqrt(x^2 + y^2 + z^2)
                        const magnitude = Math.sqrt(x*x + y*y + z*z);

                        magX.textContent = x.toFixed(2);
                        magY.textContent = y.toFixed(2);
                        magZ.textContent = z.toFixed(2);
                        magTotal.textContent = magnitude.toFixed(2) + " µT";
                    });

                    magnetometer.addEventListener('error', event => {
                        errorMsg.textContent = `Magnetometer Error: ${event.error.name} - ${event.error.message}`;
                    });

                    magnetometer.start();
                } catch (error) {
                    errorMsg.textContent = `Magnetometer initialization failed: ${error.message}`;
                }
            } else {
                errorMsg.innerHTML += "Magnetometer API not supported by this browser.<br>";
            }

            // 2. Initialize Device Orientation (Inclinometer/Compass)
            
            // For iOS 13+ devices, we must request permission explicitly
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        } else {
                            errorMsg.innerHTML += "Orientation permission denied.<br>";
                        }
                    })
                    .catch(console.error);
            } else {
                // Non-iOS 13+ devices
                window.addEventListener('deviceorientationabsolute', handleOrientation) || 
                window.addEventListener('deviceorientation', handleOrientation);
            }

            startBtn.textContent = "Sensors Running";
            startBtn.disabled = true;
            startBtn.style.backgroundColor = "#555";
        }

        function handleOrientation(event) {
            // Alpha: Compass direction (0 to 360)
            // Beta: Front-to-back tilt (-180 to 180)
            // Gamma: Left-to-right tilt (-90 to 90)
            
            let alpha = event.alpha;
            
            // Webkit compass heading fallback for iOS
            if (event.webkitCompassHeading) {
                alpha = event.webkitCompassHeading;
            }

            if (alpha !== null) dirAlpha.textContent = alpha.toFixed(1) + "°";
            if (event.beta !== null) dirBeta.textContent = event.beta.toFixed(1) + "°";
            if (event.gamma !== null) dirGamma.textContent = event.gamma.toFixed(1) + "°";
        }

        startBtn.addEventListener('click', startSensors);
    </script>
</body>
</html>
