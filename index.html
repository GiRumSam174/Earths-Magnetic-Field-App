<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Magnetic Field & Inclinometer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 1.5rem;
            text-align: center;
            color: #4CAF50;
        }
        .card {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 1.2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        .label {
            color: #aaaaaa;
        }
        .value {
            font-weight: bold;
            font-family: monospace;
        }
        .highlight {
            color: #4CAF50;
            font-size: 1.4rem;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            max-width: 400px;
        }
        button:active {
            background-color: #45a049;
        }
        #error-msg {
            color: #ff5252;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>Magnetic Field & Orientation</h1>

    <div class="card">
        <h3>Magnetometer (µT)</h3>
        <div class="data-row">
            <span class="label">X-Axis:</span>
            <span class="value" id="mag-x">0.00</span>
        </div>
        <div class="data-row">
            <span class="label">Y-Axis:</span>
            <span class="value" id="mag-y">0.00</span>
        </div>
        <div class="data-row">
            <span class="label">Z-Axis:</span>
            <span class="value" id="mag-z">0.00</span>
        </div>
        <div class="data-row">
            <span class="label">Magnitude:</span>
            <span class="value highlight" id="mag-total">0.00</span>
        </div>
    </div>

    <div class="card">
        <h3>Inclinometer / Direction</h3>
        <div class="data-row">
            <span class="label">Heading (Alpha):</span>
            <span class="value" id="dir-alpha">0.0°</span>
        </div>
        <div class="data-row">
            <span class="label">Pitch (Beta):</span>
            <span class="value" id="dir-beta">0.0°</span>
        </div>
        <div class="data-row">
            <span class="label">Roll (Gamma):</span>
            <span class="value" id="dir-gamma">0.0°</span>
        </div>
    </div>

    <button id="start-btn">Start Sensors</button>
    <div id="error-msg"></div>

    <script>
const startBtn = document.getElementById('start-btn');
const errorMsg = document.getElementById('error-msg');

async function startSensors() {
    errorMsg.textContent = "";

    // 1. Request Magnetometer Permission (The Missing Link)
    if (navigator.permissions && navigator.permissions.query) {
        try {
            const result = await navigator.permissions.query({ name: 'magnetometer' });
            if (result.state === 'denied') {
                errorMsg.innerHTML += "Permission to use magnetometer was denied.<br>";
                return;
            }
        } catch (e) {
            console.log("Permissions API not supported for magnetometer, trying anyway...");
        }
    }

    // 2. Initialize Magnetometer
    if ('Magnetometer' in window) {
        try {
            // Some browsers require a user gesture to start sensors
            const mag = new Magnetometer({ frequency: 10 });
            mag.addEventListener('reading', () => {
                const x = mag.x;
                const y = mag.y;
                const z = mag.z;
                const magnitude = Math.sqrt(x*x + y*y + z*z);

                document.getElementById('mag-x').textContent = x.toFixed(2);
                document.getElementById('mag-y').textContent = y.toFixed(2);
                document.getElementById('mag-z').textContent = z.toFixed(2);
                document.getElementById('mag-total').textContent = magnitude.toFixed(2) + " µT";
            });
            mag.start();
        } catch (error) {
            errorMsg.innerHTML += `Mag Error: ${error.message}<br>`;
        }
    } else {
        errorMsg.innerHTML += "Magnetometer API not supported. <br><i>Try enabling 'Generic Sensor Extra Classes' in chrome://flags</i><br>";
    }

    // 3. Orientation Logic (as before)
    if (typeof DeviceOrientationEvent !== 'undefined') {
        window.addEventListener('deviceorientation', (event) => {
            if (event.alpha !== null) {
                document.getElementById('dir-alpha').textContent = event.alpha.toFixed(1) + "°";
                document.getElementById('dir-beta').textContent = event.beta.toFixed(1) + "°";
                document.getElementById('dir-gamma').textContent = event.gamma.toFixed(1) + "°";
            }
        });
    }
}

startBtn.addEventListener('click', startSensors);
    </script>
</body>
</html>
